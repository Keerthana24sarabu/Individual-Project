<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Image Processor Demo</title>
  <style>
    body { font-family: Arial, sans-serif; background: #f4f4f4; color: #333; padding: 20px; }
    .page { max-width: 700px; margin: 0 auto; background: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 4px 12px rgba(0,0,0,.08); }
    h1 { margin-bottom: 10px; font-size: 1.6rem; }
    p { margin-bottom: 16px; }
    label { display: block; margin: 12px 0 4px; }
    input[type=file], select, button { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; font-size: 1rem; }
    button { background: #4a90e2; color: #fff; border: none; margin-top: 16px; cursor: pointer; }
    button:disabled { opacity: .6; cursor: not-allowed; }
    #messages { margin-top: 16px; }
    #result { margin-top: 24px; display: none; }
    #result img { max-width: 100%; border-radius: 6px; margin-top: 12px; }
    .info { margin-top: 8px; font-size: .95rem; }
  </style>
</head>
<body>
  <div class="page">
    <h1>Image Processor Demo</h1>
    <p>Upload an image, choose operations, and press Process.</p>

    <label for="imageInput">Image file</label>
    <input type="file" id="imageInput" accept="image/*">

    <label>Operations</label>
    <label><input type="checkbox" value="fliph" class="op"> Flip horizontal</label>
    <label><input type="checkbox" value="flipv" class="op"> Flip vertical</label>
    <label><input type="checkbox" value="grayscale" class="op"> Grayscale</label>
    <label><input type="checkbox" value="rotateleft" class="op"> Rotate left</label>
    <label><input type="checkbox" value="rotateright" class="op"> Rotate right</label>

    <label for="outputFormat">Output format</label>
    <select id="outputFormat">
      <option value="png">PNG</option>
      <option value="jpeg">JPEG</option>
      <option value="webp">WebP</option>
      <option value="gif">GIF</option>
      <option value="tiff">TIFF</option>
    </select>

    <button id="processButton" disabled>Process Image</button>

    <div id="messages"></div>

    <div id="result">
      <h2>Result</h2>
      <img id="resultImage" alt="Processed image">
      <div class="info"><strong>File ID:</strong> <span id="resultFileId"></span></div>
      <div class="info"><strong>Format:</strong> <span id="resultFormat"></span></div>
      <div class="info"><strong>Dimensions:</strong> <span id="resultDimensions"></span></div>
      <div class="info"><strong>Size:</strong> <span id="resultSize"></span></div>
      <div class="info"><strong>Expires:</strong> <span id="resultExpiry"></span></div>
      <a id="downloadLink" href="#" download style="display: inline-block; margin-top: 12px;">Download result</a>
    </div>
  </div>

  <script>
    const API_BASE = 'http://localhost:3000/api';
    const imageInput = document.getElementById('imageInput');
    const processButton = document.getElementById('processButton');
    const messages = document.getElementById('messages');
    const result = document.getElementById('result');
    const resultImage = document.getElementById('resultImage');
    const resultFileId = document.getElementById('resultFileId');
    const resultFormat = document.getElementById('resultFormat');
    const resultDimensions = document.getElementById('resultDimensions');
    const resultSize = document.getElementById('resultSize');
    const resultExpiry = document.getElementById('resultExpiry');
    const downloadLink = document.getElementById('downloadLink');
    const opCheckboxes = Array.from(document.querySelectorAll('.op'));

    let selectedFile = null;
    let lastResult = null;

    imageInput.addEventListener('change', () => {
      selectedFile = imageInput.files[0] || null;
      updateButton();
      clearMessages();
    });

    opCheckboxes.forEach(cb => cb.addEventListener('change', updateButton));
    processButton.addEventListener('click', processImage);

    function updateButton() {
      const hasOps = opCheckboxes.some(cb => cb.checked);
      processButton.disabled = !selectedFile || !hasOps;
    }

    async function processImage() {
      if (!selectedFile) return;
      const ops = opCheckboxes.filter(cb => cb.checked).map(cb => ({ type: cb.value }));
      if (!ops.length) {
        showMessage('Select at least one operation.', true);
        return;
      }

      const formData = new FormData();
      formData.append('image', selectedFile);
      formData.append('operations', JSON.stringify(ops));
      formData.append('outputFormat', document.getElementById('outputFormat').value);

      showMessage('Processing...', false);
      processButton.disabled = true;

      try {
        const response = await fetch(`${API_BASE}/process/transform`, { method: 'POST', body: formData });
        if (!response.ok) {
          const error = await response.json();
          throw new Error(error.error || 'Processing failed');
        }
        const data = await response.json();
        lastResult = data;
        await showResult(data);
        showMessage('Done.', false);
      } catch (err) {
        showMessage(err.message, true);
      } finally {
        processButton.disabled = false;
      }
    }

    async function showResult(data) {
      const imageResponse = await fetch(`${API_BASE}/image/download/${data.fileId}`);
      const blob = await imageResponse.blob();
      resultImage.src = URL.createObjectURL(blob);
      resultFileId.textContent = data.fileId;
      resultFormat.textContent = data.format;
      resultDimensions.textContent = `${data.width} × ${data.height}`;
      resultSize.textContent = `${Math.round(data.sizeBytes / 1024)} KB`;
      resultExpiry.textContent = new Date(data.expiresAt).toLocaleString();
      downloadLink.href = `${API_BASE}/image/download/${data.fileId}`;
      downloadLink.download = `result.${data.format}`;
      result.style.display = 'block';
    }

    function showMessage(text, isError) {
      messages.textContent = text;
      messages.style.color = isError ? '#a00' : '#080';
    }

    function clearMessages() {
      messages.textContent = '';
    }
  </script>
</body>
</html>
